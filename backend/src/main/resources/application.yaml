spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/onboardai
    username: onboardai_user
    password: onboardai_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB